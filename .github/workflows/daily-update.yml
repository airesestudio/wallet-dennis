name: Daily Production Maintenance & Update

on:
  schedule:
    # Se ejecuta todos los días a las 07:00 UTC (04:00 AM hora de Argentina)
    - cron: '0 7 * * *'
  workflow_dispatch: # Permite ejecutarlo manualmente desde la pestaña Actions en GitHub

jobs:
  daily_update_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Obtener última versión del código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Desplegar y sincronizar con Firebase Hosting en la nube
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_WALLET_DENNIS }}'
          projectId: wallet-dennis
          channelId: live
